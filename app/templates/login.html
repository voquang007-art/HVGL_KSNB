{% extends 'base.html' %}
{% block content %}
<style>
  .password-field-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .password-field-wrap input {
    width: 100%;
    padding-right: 46px;
    box-sizing: border-box;
  }

  .password-toggle-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    color: #075985;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px 6px;
  }

  .password-toggle-btn:hover {
    color: #0f5fa8;
  }

  .auth-developer-note {
    margin-top: 12px;
    text-align: center;
    color: #b77900;
    font-style: italic;
    font-weight: 700;
  }

  .auth-success-note {
    margin: 10px 0 12px 0;
    padding: 10px 12px;
    border: 1px solid #86efac;
    border-radius: 10px;
    background: #f0fdf4;
    color: #166534;
    font-weight: 600;
  }
  .login-subtitle {
    margin: 8px auto 18px auto;
    max-width: 360px;
    text-align: center;
    font-family: "Segoe UI", Arial, sans-serif;
    font-size: 21px;
    font-weight: 700;
    line-height: 1.38;
    letter-spacing: 0;
    color: #075985;
  }

  @media (max-width: 520px) {
    .login-subtitle {
      max-width: 300px;
      font-size: 18px;
      line-height: 1.42;
    }
  }
</style>

<div class="auth-card login-card">
  <div class="login-logo-wrap"><img class="login-logo" src="/static/images/logo.png" alt="Logo"></div>
  <h2>Đăng nhập</h2>
  <div class="login-subtitle">Cổng làm việc Ban Kiểm soát nội bộ</div>
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  {% if message %}<div class="auth-success-note">{{ message }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token or '' }}">
    <label>Tên đăng nhập</label>
    <input name="username" required autofocus>

    <label>Mật khẩu</label>
    <div class="password-field-wrap">
      <input id="loginPassword" name="password" type="password" required>
      <button class="password-toggle-btn" type="button" data-target="loginPassword" aria-label="Hiển thị mật khẩu" title="Hiển thị mật khẩu">👁</button>
    </div>

    <button class="primary" type="submit">Đăng nhập</button>
  </form>
  <p class="muted">Chưa có tài khoản? <a href="/register">Đăng ký sử dụng</a></p>
  <div class="auth-developer-note">Ứng dụng được phát triển bởi Võ Như Minh Quang</div>
</div>

<script>
  (function () {
    "use strict";

    document.querySelectorAll(".password-toggle-btn").forEach(function (button) {
      button.addEventListener("click", function () {
        var targetId = button.getAttribute("data-target");
        var input = document.getElementById(targetId);
        if (!input) {
          return;
        }

        if (input.type === "password") {
          input.type = "text";
          button.textContent = "🙈";
          button.setAttribute("aria-label", "Ẩn mật khẩu");
          button.setAttribute("title", "Ẩn mật khẩu");
        } else {
          input.type = "password";
          button.textContent = "👁";
          button.setAttribute("aria-label", "Hiển thị mật khẩu");
          button.setAttribute("title", "Hiển thị mật khẩu");
        }
      });
    });
  })();
</script>
{% endblock %}
